<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>မိဘမေတ္တာ - အထည်ဆိုင်</title>

<style>
:root {
    --primary: #8b5a2b;
    --secondary: #b8863f;
    --bg: #f6efe7;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: system-ui, 'Myanmar Text', sans-serif;
    background: linear-gradient(135deg,#f8f3ed,#efe3d3);
    padding: 20px;
}

/* Container */
.container {
    max-width: 620px;
    margin: auto;
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* Header */
.shop-name {
    font-size: 26px;
    font-weight: bold;
    color: var(--primary);
}

.shop-name small {
    font-size: 14px;
    color: var(--secondary);
}

.welcome {
    margin-top: 10px;
    background: #fff3e3;
    padding: 10px;
    border-radius: 50px;
    text-align: center;
    font-weight: bold;
    color: var(--secondary);
}

.info {
    margin-top: 15px;
    font-size: 14px;
    color: #5a3e2e;
    line-height: 1.6;
}

/* Image Grid */
.grid {
    display: grid;
    gap: 15px;
}

.image-card {
    border-radius: 18px;
    overflow: hidden;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.image-card:hover {
    transform: translateY(-5px) scale(1.01);
}

.image-card img {
    width: 100%;
    display: block;
}

.caption {
    padding: 10px;
    font-size: 13px;
}

/* Buttons */
.btn {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 14px;
    border-radius: 50px;
    font-weight: bold;
    text-decoration: none;
    color: white;
    margin-top: 10px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
}

.telegram {
    background: linear-gradient(135deg,#0088cc,#005f8c);
}

.viber {
    background: linear-gradient(135deg,#7360f2,#5a4ac7);
}

/* Loading */
.status {
    text-align: center;
    padding: 30px;
    color: var(--primary);
}

.spinner {
    width: 22px;
    height: 22px;
    border: 3px solid #ddd;
    border-top: 3px solid var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 95%;
    max-height: 90%;
}

.close {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 30px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- Shop Info -->
    <div class="card">
        <div class="shop-name">
            🧵 မိဘမေတ္တာ <small>အထည်ဆိုင်</small>
        </div>

        <div class="welcome">
            🙏 မင်္ဂလာပါ မိမိတို့ဆိုင်သို့ ကြိုဆိုပါတယ် 🙏
        </div>

        <div class="info">
            📞 09697455880 <br>
            📍 အိုးထိန်းကျေးရွာ၊ ပုသိမ်-မုံရွာ ကားလမ်းဘေး
        </div>
    </div>

    <!-- Image Section -->
    <div class="card">
        <div id="grid" class="grid">
            <div class="status">
                <span class="spinner"></span><br>
                ပုံများ ယူနေပါသည်...
            </div>
        </div>
    </div>

    <!-- Buttons -->
    <a href="https://t.me/mibamittaa" class="btn telegram" target="_blank">
        📱 Telegram Channel
    </a>

    <a href="viber://chat?number=%2B959697455880" class="btn viber" target="_blank">
        💬 Viber Chat
    </a>

</div>

<!-- Modal -->
<div id="modal" class="modal" onclick="this.style.display='none'">
    <span class="close">×</span>
    <img id="modalImg">
</div>

<script>
const BOT_TOKEN = "YOUR_TOKEN";
const CHANNEL = "mibamittaa";

function openModal(src){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src = src;
}

async function load(){
    const grid = document.getElementById("grid");

    try{
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
        const data = await res.json();

        let html = "";

        data.result.reverse().forEach(u=>{
            let m = u.channel_post;
            if(m && m.photo){
                let fileId = m.photo.pop().file_id;

                html += `
                <div class="image-card" onclick="openModal('https://api.telegram.org/file/bot${BOT_TOKEN}/${fileId}')">
                    <img src="https://api.telegram.org/file/bot${BOT_TOKEN}/${fileId}">
                    ${m.caption ? `<div class="caption">${m.caption}</div>` : ""}
                </div>`;
            }
        });

        grid.innerHTML = html || "No images";

    }catch{
        grid.innerHTML = "Error loading images";
    }
}

load();
</script>

</body>
</html>

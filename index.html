<!DOCTYPE html>
<html>
<head>
    <title>မိဘမေတ္တာ - အထည်ဆိုင်</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,'Myanmar Text',sans-serif;background:linear-gradient(135deg,#fdf8f0 0%,#f5e6d3 100%);min-height:100vh;padding:20px;}
        .container{max-width:700px;margin:auto;background:white;border-radius:32px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.1);}
        h1{text-align:center;color:#8b5a2b;font-size:28px;margin:10px 0 5px;}
        .welcome{text-align:center;color:#b8863f;font-size:20px;font-weight:bold;margin-bottom:25px;padding:10px;background:#fef5e8;border-radius:50px;}
        .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:30px;}
        .gallery-item{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer;transition:transform 0.2s;}
        .gallery-item:hover{transform:scale(1.02);}
        .gallery-item img{width:100%;height:150px;object-fit:cover;display:block;}
        .links{display:flex;flex-direction:column;gap:12px;margin-bottom:25px;}
        .btn{display:block;text-align:center;padding:14px;border-radius:50px;text-decoration:none;font-weight:bold;transition:0.2s;color:white;}
        .telegram{background:linear-gradient(135deg,#0088cc,#005f8c);}
        .viber{background:linear-gradient(135deg,#7360f2,#5a4ac7);}
        .messenger{background:linear-gradient(135deg,#0078ff,#005fbb);}
        .btn:hover{opacity:0.9;transform:translateY(-2px);}
        .contact{text-align:center;padding-top:15px;border-top:1px solid #eee;font-size:14px;color:#7a5a4e;}
        .contact p{margin:5px 0;}
        .counter{text-align:center;margin-top:10px;font-size:14px;color:#b8863f;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;cursor:pointer;}
        .modal img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90%;max-height:90%;object-fit:contain;}
        .modal-close{position:absolute;top:20px;right:35px;color:white;font-size:40px;font-weight:bold;cursor:pointer;}
        .loading{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#8b5a2b;border-radius:50%;animation:spin 0.6s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
    <div class="container">
        <h1>မိဘမေတ္တာ <span style="font-size:18px;">အထည်ဆိုင်</span></h1>
        <div class="welcome">✨ မှ လှိုက်လှဲစွာ ကြိုဆိုပါ၏ ✨</div>

        <div id="gallery" class="gallery"></div>
        <div id="counter" class="counter"></div>

        <!-- Link များ - သင်ပေးထားသည့်အတိုင်း အသစ်ပြင်ဆင်ပီး -->
        <div class="links">
            <a href="https://t.me/mibamittaa" class="btn telegram">📱 Telegram Channel</a>
            <a href="https://invite.viber.com/?g2=AQAkFUQwoiv461Yx1zedjxN%2BKlucfZcNOzM%2Bfh28iDVlEEcNa%2BXPXnBI1QCpLX2" class="btn viber">📞 Viber အုပ်စု</a>
            <a href="https://m.me/cm/AbYUTQe3XUOvh8yF/" class="btn messenger">💬 Messenger စာမျက်နှာ</a>
        </div>

        <!-- သင်ပေးထားသော လိပ်စာနှင့် ဖုန်းနံပါတ် -->
        <div class="contact">
            <p>📞 ဆက်သွယ်ရန် - 09676827963</p>
            <p>📍 လိပ်စာ - အိုးထိန်းကျေးရွာ၊ ပုသိမ်-မုံရွာ ကားလမ်းဘေး</p>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="">
    </div>

    <script>
        // သင့် Bot Token နှင့် Channel ID (မှန်ကန်ပီးဖြစ်ပါသည်)
        const BOT_TOKEN = "8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE";
        const CHAT_ID = "-1003486800536";

        let allImages = [];

        async function getAllChannelMessages() {
            let messages = [];
            let offset = 0;
            let hasMore = true;
            
            while(hasMore) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${offset}&limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                if(!data.ok || !data.result || data.result.length === 0) {
                    hasMore = false;
                    break;
                }
                
                for(const update of data.result) {
                    const msg = update.channel_post || update.message;
                    if(msg && msg.chat && msg.chat.id.toString() === CHAT_ID) {
                        messages.push(msg);
                    }
                    offset = update.update_id + 1;
                }
                
                if(data.result.length < 100) hasMore = false;
            }
            
            return messages;
        }

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            const counter = document.getElementById('counter');
            gallery.innerHTML = '<div style="text-align:center; padding:20px;">ပုံများ ယူနေပါသည်... <span class="loading"></span></div>';
            
            try {
                const allMessages = await getAllChannelMessages();
                const images = [];
                
                for(const msg of allMessages) {
                    if(msg.photo && msg.photo.length > 0) {
                        const photo = msg.photo[msg.photo.length - 1];
                        const fileId = photo.file_id;
                        const fileResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
                        const fileData = await fileResponse.json();
                        if(fileData.ok) {
                            const imageUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                            images.push({url: imageUrl, msgId: msg.message_id});
                        }
                    }
                }
                
                allImages = images.reverse();
                
                if(allImages.length === 0) {
                    gallery.innerHTML = '<div style="text-align:center; padding:20px; color:#b8863f;">📭 ပုံများ မရှိသေးပါ။</div>';
                    counter.innerHTML = '';
                } else {
                    gallery.innerHTML = allImages.map((img, index) => `
                        <div class="gallery-item" onclick="openModal(${index})">
                            <img src="${img.url}" alt="အထည်ပုံ" loading="lazy">
                        </div>
                    `).join('');
                    counter.innerHTML = `📸 စုစုပေါင်း ပုံအရေအတွက် - ${allImages.length}`;
                }
            } catch(err) {
                console.error(err);
                gallery.innerHTML = '<div style="text-align:center; padding:20px;">❌ အမှားရှိပါသည်။ Telegram Bot အား Channel Admin ခန့်ထားကြောင်း စစ်ဆေးပါ။</div>';
            }
        }

        function openModal(index) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            if(allImages[index] && allImages[index].url){
                modal.style.display = "block";
                modalImg.src = allImages[index].url;
            }
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        loadImages();
    </script>
</body>
</html>

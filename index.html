<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>မိဘမေတ္တာ အထည်ဆိုင်</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Myanmar Text', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #fef9f0 0%, #f5e6d3 100%);
    min-height: 100vh;
}

.top-banner {
    background: linear-gradient(135deg, #8B4513, #D2691E);
    padding: 25px 20px 20px;
    text-align: center;
    border-radius: 0 0 30px 30px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

.shop-name {
    font-size: 1.8rem;
    color: #FFD700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.shop-name small {
    font-size: 1rem;
    color: #FFECB3;
    display: block;
    margin-top: 5px;
}

.welcome-msg {
    text-align: center;
    padding: 15px 20px;
    font-size: 1.1rem;
    color: #5a3a22;
    background: rgba(255,255,255,0.7);
    margin: 15px 20px;
    border-radius: 50px;
    font-weight: 500;
}

.slider-section {
    margin: 20px 0 30px;
}

.slider-title {
    padding: 0 20px 15px;
    font-size: 1.2rem;
    color: #8B4513;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.refresh-btn {
    background: #8B4513;
    color: white;
    border: none;
    padding: 6px 15px;
    border-radius: 30px;
    font-size: 0.8rem;
    cursor: pointer;
}

.slider-container {
    position: relative;
    width: 100%;
    overflow: hidden;
}

.slider-wrapper {
    overflow-x: auto;
    scroll-behavior: smooth;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    padding: 10px 0 20px;
}

.slider-wrapper::-webkit-scrollbar {
    height: 6px;
}

.slider-wrapper::-webkit-scrollbar-track {
    background: #e8d5c0;
    border-radius: 10px;
}

.slider-wrapper::-webkit-scrollbar-thumb {
    background: #8B4513;
    border-radius: 10px;
}

.slider {
    display: inline-flex;
    gap: 18px;
    padding: 0 20px;
}

.product-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    width: 280px;
    flex-shrink: 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 35px rgba(0,0,0,0.15);
}

.product-image {
    width: 100%;
    height: 280px;
    object-fit: cover;
    background: #f0e0cd;
}

.product-info {
    padding: 12px 15px;
    background: white;
    border-top: 1px solid #f0dcc5;
}

.product-caption {
    font-size: 0.85rem;
    color: #6b4c2c;
    line-height: 1.4;
    white-space: normal;
    word-break: break-word;
}

.nav-controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px 0 25px;
}

.nav-btn {
    background: #8B4513;
    border: none;
    color: white;
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.nav-btn:hover {
    background: #D2691E;
    transform: scale(1.03);
}

.loading-box, .error-box, .empty-box {
    text-align: center;
    padding: 60px 20px;
    font-size: 1.1rem;
    background: white;
    margin: 20px;
    border-radius: 25px;
}

.loading-box { color: #8B4513; }
.error-box { color: #c0392b; }
.empty-box { color: #a08060; }

.footer {
    text-align: center;
    padding: 20px;
    font-size: 0.75rem;
    color: #b8956e;
    border-top: 1px solid #e8d5c0;
    margin-top: 20px;
}

@media (max-width: 500px) {
    .product-card { width: 240px; }
    .product-image { height: 240px; }
    .shop-name { font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="top-banner">
    <div class="shop-name">
        🧵 မိဘမေတ္တာ အထည်ဆိုင်
        <small>အရည်အသွေးမြင့် ထုတ်ကုန်များ</small>
    </div>
</div>

<div class="welcome-msg">
    🙏 မင်္ဂလာပါ မိမိတို့ဆိုင်သို့ ကြိုဆိုပါတယ် 🙏
</div>

<div class="slider-section">
    <div class="slider-title">
        <span>📸 နောက်ဆုံးထည့်သွင်းမှုများ</span>
        <button class="refresh-btn" id="manualRefresh">🔄 ပြန်လည်စတင်ရန်</button>
    </div>
    
    <div class="slider-container">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slider" id="slider">
                <div class="loading-box">📸 ပုံများ Loading လုပ်နေပါသည်...</div>
            </div>
        </div>
    </div>
</div>

<div class="nav-controls">
    <button class="nav-btn" id="prevBtn">◀ နောက်သို့</button>
    <button class="nav-btn" id="nextBtn">ရှေ့သို့ ▶</button>
</div>

<div class="footer">
    💡 တစ်ခါဖွင့်ပြီးရင် ပုံတွေ သိမ်းထားပေးမှာမို့ နောက်တစ်ခါ loading မခံရပါဘူး<br>
    📍 Channel မှာ ပုံဖျက်ရင် Refresh နှိပ်လိုက်ရုံပါ
</div>

<script>
const BOT_TOKEN = "8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE";
const CHAT_ID = "-1003808025728";

// DOM Elements
const slider = document.getElementById("slider");
const wrapper = document.getElementById("sliderWrapper");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const refreshBtn = document.getElementById("manualRefresh");

// Scroll
function scrollLeft() { wrapper.scrollBy({ left: -300, behavior: "smooth" }); }
function scrollRight() { wrapper.scrollBy({ left: 300, behavior: "smooth" }); }
prevBtn.addEventListener("click", scrollLeft);
nextBtn.addEventListener("click", scrollRight);

// ============= CACHE SYSTEM (ပုံတွေ သိမ်းထားမယ်) =============
let cachedImages = [];      // ပုံဒေတာ သိမ်းမယ်
let loadedOnce = false;     // တစ်ခါ load ပြီးရင် နောက်တစ်ခါ loading မပြအောင်
let isRefreshing = false;   // refresh လုပ်နေတယ်ဆိုတဲ့ အခြေအနေ

function getFilePath(fileId) {
    return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`)
        .then(r => r.json())
        .then(d => d.ok ? d.result.file_path : null)
        .catch(() => null);
}

function renderImages(images, showLoading = false) {
    if (images.length === 0) {
        slider.innerHTML = '<div class="empty-box">📭 လက်ရှိပုံများ မရှိသေးပါ</div>';
        return;
    }
    
    let html = "";
    for (const img of images) {
        // Cache-busting မလိုတော့ဘူး - Fresh data ပဲသုံးမယ်
        html += `
            <div class="product-card">
                <img class="product-image" src="${img.url}" alt="Product" loading="lazy" 
                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23f0dcc5%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23996b3f%22%3E📷%3C/text%3E%3C/svg%3E'">
                <div class="product-info">
                    <div class="product-caption">${escapeHtml(img.caption)}</div>
                </div>
            </div>
        `;
    }
    slider.innerHTML = html;
}

function escapeHtml(text) {
    if (!text) return "";
    return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        return '&gt;';
    });
}

async function loadImages(forceRefresh = false) {
    // if သိမ်းထားပြီးသား ပုံတွေရှိပြီး forceRefresh မဟုတ်ရင် ပြန်မခေါ်တော့ဘူး
    if (!forceRefresh && loadedOnce && cachedImages.length > 0) {
        // သိမ်းထားတဲ့ပုံတွေနဲ့ပဲ ပြမယ်
        return;
    }
    
    // Refresh လုပ်နေတယ်ဆိုရင် loading ပြမယ်
    if (forceRefresh) {
        slider.innerHTML = '<div class="loading-box">🔄 ပုံများ ပြန်လည် Load လုပ်နေပါသည်...</div>';
        isRefreshing = true;
    } else if (!loadedOnce) {
        slider.innerHTML = '<div class="loading-box">📸 ပုံများ Loading လုပ်နေပါသည်...</div>';
    }
    
    try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
        const data = await res.json();
        
        if (!data.ok) throw new Error("API error");
        
        const images = [];
        
        for (const update of data.result) {
            const msg = update.channel_post || update.message;
            if (!msg) continue;
            if (msg.chat && msg.chat.id.toString() === CHAT_ID && msg.photo) {
                const fileId = msg.photo[msg.photo.length - 1].file_id;
                const filePath = await getFilePath(fileId);
                if (filePath) {
                    images.push({
                        url: `https://api.telegram.org/file/bot${BOT_TOKEN}/${filePath}`,
                        caption: msg.caption || "",
                        date: msg.date,
                        messageId: msg.message_id
                    });
                }
            }
        }
        
        // အသစ်ဆုံးပုံ အရင်ပြမယ်
        images.sort((a, b) => b.date - a.date);
        
        // Cache ထဲသိမ်းမယ်
        cachedImages = images;
        loadedOnce = true;
        
        renderImages(cachedImages);
        
        if (forceRefresh) {
            // Refresh ပြီးသွားပြီဆိုတဲ့ အချက်ပြမယ်
            setTimeout(() => {
                isRefreshing = false;
            }, 500);
        }
        
    } catch (err) {
        console.error(err);
        if (!loadedOnce) {
            slider.innerHTML = '<div class="error-box">❌ နည်းပညာချို့ယွင်းနေပါသည်။ နောက်မှထပ်ကြည့်ပါ။</div>';
        }
    }
}

// Manual Refresh Button
refreshBtn.addEventListener("click", () => {
    loadImages(true);
});

// TIP: Page ဖွင့်ပြီးတာနဲ့ load လုပ်မယ်
loadImages(false);

// TIP: ပုံအသစ်တွေအတွက် 30 စက္ကန့်မှ တစ်ခါ စစ်မယ် (မကြာခဏ loading မပြအောင်)
setInterval(() => {
    if (!isRefreshing) {
        loadImages(false);
    }
}, 30000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>မိဘမေတ္တာ - အထည်ဆိုင်</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Myanmar Text', -apple-system, sans-serif;
            background: #fdf8f0;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #8b5a2b;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .welcome {
            text-align: center;
            color: #b8863f;
            font-size: 16px;
            margin-bottom: 20px;
            background: #fff9f0;
            padding: 8px;
            border-radius: 15px;
        }

        /* Album Grid View (အထပ်လိုက်/အကွက်လိုက်) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }
        .grid-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #eee;
            position: relative;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .grid-item:hover img {
            transform: scale(1.1);
        }

        /* Slider Modal (နှိပ်လိုက်မှ ဒေါင်လိုက်ပေါ်မည့်နေရာ) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 10px;
        }
        .full-image-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        .full-image-card img {
            width: 100%;
            display: block;
        }
        .full-image-caption {
            padding: 15px;
            font-size: 15px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .close-btn {
            position: fixed;
            top: 15px; right: 20px;
            background: #8b5a2b;
            color: white; border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            z-index: 1001;
            cursor: pointer;
        }

        /* Buttons & Contact */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            color: white;
        }
        .telegram { background: #0088cc; }
        .viber { background: #7360f2; }
        .contact {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }
        .loading-status {
            text-align: center;
            padding: 40px;
            color: #8b5a2b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>မိဘမေတ္တာ အထည်ဆိုင်</h1>
    <div class="welcome">✨ အသစ်ရောက်ရှိသော အထည်များ ✨</div>

    <div id="loading" class="loading-status">ပုံများတင်နေပါသည်...</div>
    <div id="galleryGrid" class="gallery-grid"></div>

    <div class="links">
        <a href="https://t.me/mibamittaa" class="btn telegram">Telegram Channel</a>
        <a href="viber://chat?lang=en&g2=AQAkFUQwoiv461Yx1zedjxN%2BKlucfZcNOzM%2Bfh28iDVlEEcNa%2BXPXnBI1QCpLX2" class="btn viber">Viber Group</a>
    </div>

    <div class="contact">
        <p>📞 09676827963</p>
        <p>📍 အိုးထိန်းကျေးရွာ၊ ပုသိမ်-မုံရွာ ကားလမ်းဘေး</p>
    </div>
</div>

<div id="imgModal" class="modal">
    <button class="close-btn" onclick="closeModal()">✕ ပိတ်ရန်</button>
    <div id="modalContent" class="modal-content"></div>
</div>

<script>
    const BOT_TOKEN = "8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE";
    const CHAT_ID = "-1003486800536";
    let storeData = [];

    async function fetchTelegramPosts() {
        try {
            // getUpdates သည် ၂၄ နာရီအတွင်း message ကိုသာပြသနိုင်သဖြင့် 
            // ပိုမိုကောင်းမွန်သော နည်းလမ်းမှာ Bot ကို Admin ပေးထားပြီး ပုံမှန် Refresh လုပ်ပေးရန်ဖြစ်သည်
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
            const data = await response.json();
            
            if (data.ok) {
                // filter only images from specific chat
                const updates = data.result.reverse(); 
                storeData = [];

                for (let item of updates) {
                    const msg = item.channel_post || item.message;
                    if (msg && msg.chat.id.toString() === CHAT_ID && msg.photo) {
                        const photo = msg.photo[msg.photo.length - 1];
                        const caption = msg.caption || "";
                        storeData.push({ fileId: photo.file_id, caption: caption });
                    }
                }
                renderGrid();
            }
        } catch (error) {
            document.getElementById('loading').innerText = "ချိတ်ဆက်မှု အဆင်မပြေပါ...";
        }
    }

    async function renderGrid() {
        const grid = document.getElementById('galleryGrid');
        const loading = document.getElementById('loading');
        grid.innerHTML = "";
        
        if (storeData.length === 0) {
            loading.innerText = "ပုံများ မရှိသေးပါ သို့မဟုတ် Channel တွင် ပုံအသစ်တင်ပေးပါ။";
            return;
        }

        loading.style.display = "none";

        for (let [index, item] of storeData.entries()) {
            const fileInfo = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${item.fileId}`);
            const fileData = await fileInfo.json();
            const imgUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
            item.url = imgUrl; // store real url for modal

            const div = document.createElement('div');
            div.className = 'grid-item';
            div.onclick = () => openModal(index);
            div.innerHTML = `<img src="${imgUrl}" alt="clothes">`;
            grid.appendChild(div);
        }
    }

    function openModal(startIndex) {
        const modal = document.getElementById('imgModal');
        const content = document.getElementById('modalContent');
        content.innerHTML = "";

        // ပုံအားလုံးကို ဒေါင်လိုက် ပြပေးမည်
        storeData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'full-image-card';
            card.id = `scroll-target-${idx}`;
            card.innerHTML = `
                <img src="${item.url}">
                ${item.caption ? `<div class="full-image-caption">${item.caption}</div>` : ''}
            `;
            content.appendChild(card);
        });

        modal.style.display = "block";
        document.body.style.overflow = "hidden";

        // နှိပ်လိုက်တဲ့ပုံဆီ auto scroll ဆွဲသွားပေးမည်
        setTimeout(() => {
            document.getElementById(`scroll-target-${startIndex}`).scrollIntoView();
        }, 100);
    }

    function closeModal() {
        document.getElementById('imgModal').style.display = "none";
        document.body.style.overflow = "auto";
    }

    fetchTelegramPosts();
</script>

</body>
</html>

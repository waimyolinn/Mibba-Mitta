<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မိဘမေတ္တာ - အထည်ဆိုင်</title>
    <style>
        body { font-family: system-ui; background: #f5e6d3; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 30px; padding: 20px; }
        .shop-name { font-size: 28px; font-weight: bold; color: #8b5a2b; text-align: center; }
        .welcome { text-align: center; color: #b8863f; margin: 15px 0; }
        .image-card { background: #f9f3ec; border-radius: 20px; overflow: hidden; margin-bottom: 20px; cursor: pointer; }
        .image-card img { width: 100%; display: block; }
        .btn { display: block; text-align: center; padding: 14px; border-radius: 50px; text-decoration: none; font-weight: bold; color: white; margin: 10px 0; }
        .telegram { background: #0088cc; }
        .viber { background: #7360f2; }
        .status { text-align: center; padding: 30px; color: #8b5a2b; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #8b5a2b; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="shop-name">🧵 မိဘမေတ္တာ <small>အထည်ဆိုင်</small></div>
    <div class="welcome">🙏 မင်္ဂလာပါ မိမိတို့ဆိုင်သို့ ကြိုဆိုပါတယ် 🙏</div>
    
    <div id="images"></div>
    
    <a href="https://t.me/mibamittaa" class="btn telegram" target="_blank">📱 Telegram Channel</a>
    <a href="viber://chat?number=%2B959697455880" class="btn viber">💬 Viber</a>
</div>

<script>
    async function loadImages() {
        const container = document.getElementById('images');
        container.innerHTML = '<div class="status"><span class="spinner"></span> Loading...</div>';
        
        try {
            // Get image list
            const res = await fetch('/telegram?_=' + Date.now());
            const data = await res.json();
            
            if (!data.success || data.images.length === 0) {
                container.innerHTML = '<div class="status">📭 ပုံမရှိသေးပါ</div>';
                return;
            }
            
            let html = '';
            
            // Load each image
            for (const img of data.images) {
                const fileRes = await fetch('/telegram/file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: img.file_id })
                });
                
                if (fileRes.ok) {
                    const blob = await fileRes.blob();
                    const url = URL.createObjectURL(blob);
                    html += `<div class="image-card"><img src="${url}" loading="lazy"></div>`;
                }
            }
            
            container.innerHTML = html || '<div class="status">❌ ပုံယူလို့မရပါ</div>';
            
        } catch(e) {
            console.error(e);
            container.innerHTML = '<div class="status">❌ Error</div>';
        }
    }
    
    loadImages();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>မိဘမေတ္တာ အထည်ဆိုင်</title>

<style>
body {
    font-family: system-ui;
    background:#f5e6d3;
    padding:20px;
}
.container {
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}
.image-card {
    margin-bottom:20px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.image-card img {
    width:100%;
}
.caption {
    padding:10px;
}
</style>
</head>

<body>

<div class="container">
<h2 style="text-align:center;">မိဘမေတ္တာ အထည်ဆိုင်</h2>
<div id="grid"></div>
</div>

<script>
const BOT_TOKEN = 8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE
const CHAT_ID = "-1003808025728"; //  group id

let items = [];

// get messages
async function load() {
    const res = await fetch(`https://api.telegram.org/bot${8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE}/getUpdates`);
    const data = await res.json();

    const list = [];

    data.result.forEach(update => {
        const msg = update.channel_post || update.message;

        if(!msg) return;

        if(msg.chat.id.toString() === CHAT_ID) {

            //  deleted message filter
            if(msg.delete_chat_photo || msg.left_chat_member) return;

            if(msg.photo) {
                const photo = msg.photo[msg.photo.length-1];

                list.push({
                    file_id: photo.file_id,
                    caption: msg.caption || ""
                });
            }
        }
    });

    items = list.reverse();
    render();
}

// render
async function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for(const item of items) {
        const fileRes = await fetch(`https://api.telegram.org/bot${8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE}/getFile?file_id=${item.file_id}`);
        const fileData = await fileRes.json();

        if(!fileData.ok) continue;

        const url = `https://api.telegram.org/file/bot${8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE}/${fileData.result.file_path}`;

        grid.innerHTML += `
            <div class="image-card">
                <img src="${url}">
                <div class="caption">${item.caption}</div>
            </div>
        `;
    }
}

// auto refresh (5 sec)
setInterval(load, 5000);

load();
</script>

</body>
</html>

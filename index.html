<script>
const BOT_TOKEN = "8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE";
const CHAT_ID = "-1003486800536";

let allItems = [];
let deletedIds = new Set();

// Fetch messages
async function getAllMessages() {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`;
    const res = await fetch(url);
    const data = await res.json();

    if(!data.ok) return [];

    return data.result
        .map(u => u.channel_post || u.message)
        .filter(msg => msg && msg.chat && msg.chat.id.toString() === CHAT_ID);
}

// Load images
async function loadImages() {
    const gridView = document.getElementById('gridView');
    const counterDiv = document.getElementById('counter');

    gridView.innerHTML = '<div class="status">ပုံများ ယူနေပါသည်... ⏳</div>';

    try {
        const messages = await getAllMessages();
        let items = [];

        for(const msg of messages) {
            let caption = msg.caption || "";

            // 🔴 DELETE COMMAND (#delete + reply)
            if(caption.includes("#delete")) {
                if(msg.reply_to_message) {
                    deletedIds.add(msg.reply_to_message.message_id);
                }
                continue;
            }

            // skip deleted
            if(deletedIds.has(msg.message_id)) continue;

            if(msg.photo && msg.photo.length > 0) {
                const photo = msg.photo[msg.photo.length - 1];

                const fileRes = await fetch(
                    `https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${photo.file_id}`
                );
                const fileData = await fileRes.json();

                if(fileData.ok) {
                    // ✅ CACHE FIX
                    const imageUrl =
                        `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}?t=${Date.now()}`;

                    items.push({
                        id: msg.message_id,
                        url: imageUrl,
                        caption: caption
                    });
                }
            }
        }

        // ✅ REMOVE DUPLICATES
        const unique = {};
        items.forEach(i => unique[i.id] = i);
        allItems = Object.values(unique).reverse();

        if(allItems.length === 0) {
            gridView.innerHTML = '<div class="status">📭 ပုံများ မရှိသေးပါ။</div>';
            counterDiv.innerHTML = '';
            return;
        }

        // Grid render
        gridView.innerHTML = allItems.map((item, index) => {
            let captionHtml = item.caption ? `<div class="caption">${escapeHtml(item.caption)}</div>` : '';
            return `
                <div class="image-card" onclick="openSlider(${index})">
                    <img src="${item.url}" 
                         alt="အထည်ပုံ" 
                         loading="lazy"
                         onerror="this.parentElement.remove()" />
                    ${captionHtml}
                </div>
            `;
        }).join('');

        counterDiv.innerHTML = `📸 စုစုပေါင်း - ${allItems.length}`;

    } catch(err) {
        console.error(err);
        gridView.innerHTML = '<div class="status">❌ Error loading images</div>';
    }
}

// Slider
function openSlider(clickedIndex) {
    const modal = document.getElementById('sliderModal');
    const sliderContainer = document.getElementById('sliderContainer');

    sliderContainer.innerHTML = allItems.map((item, idx) => {
        let captionHtml = item.caption ? `<div class="slider-caption">${escapeHtml(item.caption)}</div>` : '';
        return `
            <div class="slider-item" id="slider-item-${idx}">
                <img src="${item.url}" onerror="this.remove()">
                ${captionHtml}
            </div>
        `;
    }).join('');

    modal.style.display = "block";
    document.body.style.overflow = "hidden";

    setTimeout(() => {
        const target = document.getElementById(`slider-item-${clickedIndex}`);
        if(target) target.scrollIntoView({ behavior: 'smooth' });
    }, 100);
}

function closeSlider() {
    document.getElementById('sliderModal').style.display = "none";
    document.body.style.overflow = "auto";
}

// Escape HTML
function escapeHtml(text) {
    if(!text) return '';
    return text.replace(/[&<>]/g, function(m) {
        return m === '&' ? '&' : m === '<' ? '<' : '>';
    });
}

// Init
loadImages();
</script>

<!DOCTYPE html>
<html>
<head>
    <title>မိဘမေတ္တာ - အထည်ဆိုင်</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,'Myanmar Text',sans-serif;background:linear-gradient(135deg,#fdf8f0 0%,#f5e6d3 100%);min-height:100vh;padding:20px;}
        .container{max-width:700px;margin:auto;background:white;border-radius:32px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.1);}
        .logo{font-size:50px;text-align:center;}
        h1{text-align:center;color:#8b5a2b;font-size:28px;margin:10px 0 5px;}
        .subtitle{text-align:center;color:#b8863f;font-style:italic;margin-bottom:25px;}
        .upload-area{background:#f9f3ec;border-radius:24px;padding:20px;margin-bottom:25px;text-align:center;border:2px dashed #d4b48c;}
        .upload-label{background:#8b5a2b;color:white;padding:12px 24px;border-radius:40px;cursor:pointer;display:inline-block;font-weight:bold;}
        #imageInput{display:none;}
        .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:30px;}
        .gallery-item{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .gallery-item img{width:100%;height:150px;object-fit:cover;display:block;}
        .delete-btn{position:absolute;top:5px;right:5px;background:rgba(255,0,0,0.7);color:white;border:none;border-radius:20px;padding:4px 10px;cursor:pointer;font-size:12px;}
        .links{display:flex;flex-direction:column;gap:12px;margin-bottom:25px;}
        .btn{display:block;text-align:center;padding:14px;border-radius:50px;text-decoration:none;font-weight:bold;transition:0.2s;color:white;}
        .telegram{background:linear-gradient(135deg,#0088cc,#005f8c);}
        .viber{background:linear-gradient(135deg,#7360f2,#5a4ac7);}
        .messenger{background:linear-gradient(135deg,#0078ff,#005fbb);}
        .btn:hover{opacity:0.9;transform:translateY(-2px);}
        .contact{text-align:center;padding-top:15px;border-top:1px solid #eee;font-size:14px;color:#7a5a4e;}
        .contact p{margin:5px 0;}
        .status{text-align:center;margin-top:10px;font-size:13px;color:#8b5a2b;}
        .loading{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#8b5a2b;border-radius:50%;animation:spin 0.6s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💝</div>
        <h1>မိဘမေတ္တာ <span style="font-size:18px;">အထည်ဆိုင်</span></h1>
        <p class="subtitle">"အရည်အသွေးမြင့် ၊ ဈေးနှုန်းချိုသာ"</p>

        <div class="upload-area">
            <label class="upload-label" id="uploadBtn">📸 ပုံအသစ်တင်ရန်</label>
            <input type="file" id="imageInput" accept="image/*" multiple>
            <div id="uploadStatus" class="status"></div>
        </div>

        <div id="gallery" class="gallery"></div>

        <div class="links">
            <a href="https://t.me/mibamittaa" class="btn telegram">📱 Telegram Channel</a>
            <a href="https://chats.viber.com/mibametta" class="btn viber">📞 Viber Channel</a>
            <a href="https://m.me/mibametta" class="btn messenger">💬 Messenger Page</a>
        </div>

        <div class="contact">
            <p>📞 ဆက်သွယ်ရန် - 09 123 456 789</p>
            <p>📍 လိပ်စာ - ရန်ကုန်မြို့၊ ဗဟန်းမြို့နယ်</p>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE";
        const CHAT_ID = "-1003486800536";

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div style="text-align:center; padding:20px;">ပုံများ ယူနေပါသည်... <span class="loading"></span></div>';
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&limit=50`;
                const response = await fetch(url);
                const data = await response.json();
                if(data.ok && data.result){
                    const images = [];
                    for(const update of data.result){
                        const msg = update.channel_post || update.message;
                        if(msg && msg.chat && msg.chat.id.toString() === CHAT_ID && msg.photo){
                            const photo = msg.photo[msg.photo.length-1];
                            const fileId = photo.file_id;
                            const fileResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
                            const fileData = await fileResponse.json();
                            if(fileData.ok){
                                const imageUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                                images.push({url: imageUrl, msgId: msg.message_id});
                            }
                        }
                    }
                    if(images.length === 0){
                        gallery.innerHTML = '<div style="text-align:center; padding:20px; color:#b8863f;">📭 ပုံများ မရှိသေးပါ။ အပေါ်က တင်နိုင်ပါတယ်။</div>';
                    } else {
                        gallery.innerHTML = images.map(img => `
                            <div class="gallery-item">
                                <img src="${img.url}" alt="အထည်ပုံ">
                                <button class="delete-btn" onclick="deleteImage(${img.msgId})">✕</button>
                            </div>
                        `).join('');
                    }
                } else {
                    gallery.innerHTML = '<div style="text-align:center; padding:20px;">📭 ပုံများ မရှိသေးပါ။</div>';
                }
            } catch(err){
                gallery.innerHTML = '<div style="text-align:center; padding:20px;">❌ အမှားရှိပါသည်။ Telegram Bot အား Channel Admin ခန့်ထားကြောင်း စစ်ဆေးပါ။</div>';
            }
        }

        async function uploadImage(file){
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', file);
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method: 'POST', body: formData});
            return response.json();
        }

        async function deleteImage(msgId){
            if(!confirm('ဒီပုံကို ဖျက်မှာလား?')) return;
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, message_id: msgId})
                });
                const result = await response.json();
                if(result.ok) loadImages();
                else alert('ပုံဖျက်ရန် မအောင်မြင်ပါ။ Bot အား Admin ခန့်ထားကြောင်း သေချာပါစေ။');
            } catch(err){ alert('အမှားရှိပါသည်။'); }
        }

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const files = e.target.files;
            const status = document.getElementById('uploadStatus');
            for(const file of files){
                if(!file.type.startsWith('image/')) { status.innerHTML = '❌ ပုံဖိုင်သာ တင်နိုင်ပါသည်။'; continue; }
                status.innerHTML = `⏫ ${file.name} တင်နေပါသည်... <span class="loading"></span>`;
                try {
                    const result = await uploadImage(file);
                    if(result.ok){
                        status.innerHTML = `✅ ${file.name} အောင်မြင်ပါသည်။`;
                        setTimeout(() => { status.innerHTML = ''; }, 3000);
                    } else {
                        status.innerHTML = `❌ ${file.name} မအောင်မြင်ပါ။ ${result.description || ''}`;
                    }
                } catch(err){ status.innerHTML = `❌ ${file.name} အမှားရှိပါသည်။`; }
            }
            document.getElementById('imageInput').value = '';
            loadImages();
        });

        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });

        loadImages();
    </script>
</body>
</html>

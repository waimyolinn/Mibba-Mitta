<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>မိဘမေတ္တာ - အထည်ဆိုင်</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,'Myanmar Text',sans-serif;background:linear-gradient(135deg,#fdf8f0 0%,#f5e6d3 100%);min-height:100vh;padding:20px;}
        .container{max-width:700px;margin:auto;background:white;border-radius:32px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.1);}
        h1{text-align:center;color:#8b5a2b;font-size:28px;}
        .welcome{text-align:center;color:#b8863f;font-size:18px;font-weight:bold;margin:10px 0 20px;padding:10px;background:#fef5e8;border-radius:50px;}
        
        /* Gallery */
        .gallery{column-count:2;column-gap:15px;margin-bottom:30px;}
        .gallery-item{break-inside:avoid;margin-bottom:15px;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer;background:#f9f3ec;}
        .gallery-item img{width:100%;display:block;}
        .caption{padding:10px;font-size:14px;color:#5a3e2e;background:white;border-top:1px solid #eee;word-break:break-word;}
        
        .links{display:flex;flex-direction:column;gap:12px;margin-bottom:25px;}
        .btn{display:block;text-align:center;padding:14px;border-radius:50px;text-decoration:none;font-weight:bold;color:white;}
        .telegram{background:linear-gradient(135deg,#0088cc,#005f8c);}
        .viber{background:linear-gradient(135deg,#7360f2,#5a4ac7);}
        .contact{text-align:center;padding-top:15px;border-top:1px solid #eee;font-size:14px;color:#7a5a4e;}
        .contact p{margin:5px 0;}
        .counter{text-align:center;margin:15px 0;font-size:14px;color:#b8863f;}
        
        /* Modal with Back Button */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;}
        .modal-content{position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;}
        .modal img{max-width:90%;max-height:80%;object-fit:contain;}
        .back-btn{position:absolute;top:20px;left:20px;background:#8b5a2b;color:white;border:none;padding:10px 20px;border-radius:40px;font-size:16px;cursor:pointer;z-index:1001;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
        .close-btn{position:absolute;top:20px;right:20px;color:white;font-size:40px;cursor:pointer;z-index:1001;}
        
        .loading{display:inline-block;width:20px;height:20px;border:3px solid #ddd;border-top-color:#8b5a2b;border-radius:50%;animation:spin 0.6s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .status{text-align:center;padding:20px;color:#8b5a2b;}
        @media (max-width:500px){.gallery{column-count:1;}}
    </style>
</head>
<body>
    <div class="container">
        <h1>မိဘမေတ္တာ <span style="font-size:18px;">အထည်ဆိုင်</span></h1>
        <div class="welcome">✨ မင်္ဂလာပါ ✨</div>

        <div id="gallery" class="gallery"></div>
        <div id="counter" class="counter"></div>

        <div class="links">
            <a href="https://t.me/mibamittaa" class="btn telegram">📱 Telegram Channel</a>
            <a href="https://invite.viber.com/?g2=AQAkFUQwoiv461Yx1zedjxN%2BKlucfZcNOzM%2Bfh28iDVlEEcNa%2BXPXnBI1QCpLX2" class="btn viber">📞 Viber အုပ်စု</a>
        </div>

        <div class="contact">
            <p>📞 ဆက်သွယ်ရန် - 09676827963</p>
            <p>📍 လိပ်စာ - အိုးထိန်းကျေးရွာ၊ ပုသိမ်-မုံရွာ ကားလမ်းဘေး</p>
        </div>
    </div>

    <!-- Modal for image preview -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <button class="back-btn" onclick="closeModal()">◀ Back</button>
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modalImage" src="">
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE";
        const CHAT_ID = "-1003486800536";

        let allItems = []; // Store {type, url, caption}

        async function getAllMessages() {
            let messages = [];
            let offset = 0;
            let hasMore = true;
            while(hasMore) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${offset}&limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                if(!data.ok || !data.result || data.result.length === 0) break;
                for(const update of data.result) {
                    const msg = update.channel_post || update.message;
                    if(msg && msg.chat && msg.chat.id.toString() === CHAT_ID) {
                        messages.push(msg);
                    }
                    offset = update.update_id + 1;
                }
                if(data.result.length < 100) hasMore = false;
            }
            return messages.reverse(); // newest last, but we'll reverse later
        }

        async function loadContent() {
            const gallery = document.getElementById('gallery');
            const counter = document.getElementById('counter');
            gallery.innerHTML = '<div class="status">ပုံများ ယူနေပါသည်... <span class="loading"></span></div>';
            
            try {
                const allMessages = await getAllMessages();
                const items = [];
                
                for(const msg of allMessages) {
                    let caption = msg.caption || "";
                    // Check for photo
                    if(msg.photo && msg.photo.length > 0) {
                        const photo = msg.photo[msg.photo.length - 1];
                        const fileResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${photo.file_id}`);
                        const fileData = await fileResponse.json();
                        if(fileData.ok) {
                            const imageUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                            items.push({ type: 'photo', url: imageUrl, caption: caption });
                        }
                    }
                    // Optional: handle text-only messages if needed later
                }
                
                allItems = items.reverse(); // Show newest first
                
                if(allItems.length === 0) {
                    gallery.innerHTML = '<div class="status">📭 ပုံများ မရှိသေးပါ။</div>';
                    counter.innerHTML = '';
                } else {
                    gallery.innerHTML = allItems.map((item, index) => {
                        let captionHtml = item.caption ? `<div class="caption">${escapeHtml(item.caption)}</div>` : '';
                        return `
                            <div class="gallery-item" onclick="openModal(${index})">
                                <img src="${item.url}" alt="အထည်ပုံ" loading="lazy">
                                ${captionHtml}
                            </div>
                        `;
                    }).join('');
                    counter.innerHTML = `📸 စုစုပေါင်း ပုံအရေအတွက် - ${allItems.length}`;
                }
            } catch(err) {
                console.error(err);
                gallery.innerHTML = '<div class="status">❌ အမှားရှိပါသည်။ Bot အား Channel Admin ခန့်ထားကြောင်း စစ်ဆေးပါ။</div>';
            }
        }

        function openModal(index) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            if(allItems[index] && allItems[index].url){
                modal.style.display = "flex";
                modalImg.src = allItems[index].url;
            }
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        function escapeHtml(text) {
            if(!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        loadContent();
    </script>
</body>
</html>

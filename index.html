<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>မိဘမေတ္တာ အထည်ဆိုင်</title>

<style>
body {
    font-family: sans-serif;
    background: #f5e6d3;
    padding: 15px;
}
.container {
    max-width: 500px;
    margin: auto;
}
.image-card {
    background: white;
    margin-bottom: 15px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.image-card img {
    width: 100%;
}
.caption {
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>မိဘမေတ္တာ အထည်ဆိုင်</h2>
    <div id="images">Loading...</div>
</div>

<script>

/* ===========================
   🔥 ဒီ 2 ခုကို မင်းအစားထိုးရမယ်
=========================== */

// 👉 Bot Token ထည့်ရန် (အပြည့်အစုံ)
const BOT_TOKEN = "8782193599:AAFrPHXaazbPfsZZOmHESiugrnv_M5tiKfE";

// 👉 Group Chat ID ထည့်ရန်
const CHAT_ID = "-1003808025728";


/* ===========================
   🔧 file_path ယူမယ့် function
=========================== */

async function getFilePath(file_id) {
    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${file_id}`);
    const data = await res.json();

    if(data.ok) {
        return data.result.file_path;
    } else {
        return null;
    }
}


/* ===========================
   🚀 ပုံတွေ load လုပ်မယ်
=========================== */

async function loadImages() {
    const container = document.getElementById("images");
    container.innerHTML = "Loading...";

    try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
        const data = await res.json();

        let html = "";

        for(const update of data.result) {

            // 👉 Channel forward + group message နှစ်မျိုးလုံး handle
            const msg = update.channel_post || update.message;
            if(!msg) continue;

            // 👉 မင်း group id ကိုစစ်
            if(msg.chat.id.toString() === CHAT_ID && msg.photo) {

                const file_id = msg.photo[msg.photo.length - 1].file_id;

                // 👉 file_path ယူ
                const file_path = await getFilePath(file_id);

                if(!file_path) continue;

                // 👉 image URL တည်ဆောက်
                const imageUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${file_path}`;

                html += `
                    <div class="image-card">
                        <img src="${imageUrl}" loading="lazy">
                        <div class="caption">${msg.caption || ""}</div>
                    </div>
                `;
            }
        }

        if(html === "") {
            container.innerHTML = "📭 ပုံမရှိသေးပါ";
        } else {
            container.innerHTML = html;
        }

    } catch(err) {
        console.log(err);
        container.innerHTML = "❌ Error ဖြစ်နေပါတယ်";
    }
}


/* ===========================
   🔄 Auto refresh (10 sec)
=========================== */

setInterval(loadImages, 10000);

// 👉 page load အချိန်တစ်ခါခေါ်
loadImages();

</script>

</body>
</html>
